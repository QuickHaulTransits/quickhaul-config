name: GitOps - Image Tag Update (OIDC-Ready)

on:
  workflow_call:
    inputs:
      service:
        required: true
        type: string
      tag:
        required: true
        type: string
      environment:
        required: true
        type: string
  workflow_dispatch:
    inputs:
      service:
        description: 'Microservice name (auth, booking, etc.)'
        required: true
      tag:
        description: 'New image tag'
        required: true
      environment:
        description: 'Environment (dev or prod)'
        required: true
        default: 'dev'
  repository_dispatch:
    types: [image-update]

permissions:
  contents: write
  id-token: write

jobs:
  update-config:
    runs-on: ubuntu-latest
    outputs:
      service: ${{ steps.vars.outputs.service }}
      env: ${{ steps.vars.outputs.env }}
      tag: ${{ steps.vars.outputs.tag }}
    steps:
      - name: Checkout Config Repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Inputs
        id: vars
        run: |
          if [[ "${{ github.event_name }}" == "repository_dispatch" ]]; then
            echo "service=${{ github.event.client_payload.service }}" >> $GITHUB_OUTPUT
            echo "tag=${{ github.event.client_payload.tag }}" >> $GITHUB_OUTPUT
            echo "env=${{ github.event.client_payload.environment }}" >> $GITHUB_OUTPUT
          elif [[ "${{ github.event_name }}" == "workflow_call" ]]; then
            echo "service=${{ inputs.service }}" >> $GITHUB_OUTPUT
            echo "tag=${{ inputs.tag }}" >> $GITHUB_OUTPUT
            echo "env=${{ inputs.environment }}" >> $GITHUB_OUTPUT
          else
            echo "service=${{ github.event.inputs.service }}" >> $GITHUB_OUTPUT
            echo "tag=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
            echo "env=${{ github.event.inputs.environment }}" >> $GITHUB_OUTPUT
          fi

      - name: CD Gatekeeper - Trivy Security Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "ghcr.io/sathvik307393/quickhaul-${{ steps.vars.outputs.service }}:${{ steps.vars.outputs.tag }}"
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Update Image Tag in Helm Values
        run: |
          SERVICE="${{ steps.vars.outputs.service }}"
          TAG="${{ steps.vars.outputs.tag }}"
          ENV="${{ steps.vars.outputs.env }}"
          FILE="helm-charts/environments/${ENV}/values.yaml"
          
          echo "Updating ${SERVICE} image tag to ${TAG} in ${ENV}..."
          
          if [[ ! -f "$FILE" ]]; then
            echo "Error: Environment values file $FILE not found!"
            exit 1
          fi
          
          # Update the specific service tag under global.images using yq
          yq -i ".global.images.\"${SERVICE}\" = \"ghcr.io/sathvik307393/quickhaul-${SERVICE}:${TAG}\"" ${FILE}
          
          # Git Push
          git config --global user.name "QuickHaul CD Bot"
          git config --global user.email "cd-bot@quickhaul.io"
          git add ${FILE}
          git commit -m "chore(gitops): update ${SERVICE} image to ${TAG} in ${ENV}"
          git push origin main

  dast-scan:
    needs: update-config
    runs-on: ubuntu-latest
    # Only run DAST for public-facing services
    if: |
      contains(fromJSON('["auth", "booking", "location", "notification", "otp", "frontend"]'), needs.update-config.outputs.service)
    steps:
      - name: Wait for ArgoCD Sync
        uses: argoproj/argo-cd-action/@master
        with:
          command: app wait quickhaul-${{ needs.update-config.outputs.env }}-${{ needs.update-config.outputs.service }}
          server: ${{ secrets.ARGOCD_SERVER }}
          token: ${{ secrets.ARGOCD_AUTH_TOKEN }}

      - name: ZAP Scan (DAST)
        uses: zaproxy/action-full-scan@v0.12.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          docker_name: 'ghcr.io/zaproxy/zaproxy:stable'
          target: 'https://${{ needs.update-config.outputs.service }}.quickhaul.io'
          rules_file_name: '.zap/rules.tsv'
          allow_issue_writing: true
          fail_action: false
