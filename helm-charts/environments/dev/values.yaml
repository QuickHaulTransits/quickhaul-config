# Development Environment Values
# Mapped to 'develop' branch
# Namespace: quickhaul-dev

global:
  namespace: quickhaul-dev
  environment: dev
  replicaCount: 1
  nodePort: 30081
  strategy:
    type: "Deployment"
  
  # Development image tags - versioned for stability
  images:
    auth: "ghcr.io/QuickHaulTransits/quickhaul-auth:latest"
    booking: "ghcr.io/QuickHaulTransits/quickhaul-booking:latest"
    location: "ghcr.io/QuickHaulTransits/quickhaul-location:latest"
    notification: "ghcr.io/QuickHaulTransits/quickhaul-notification:latest"
    otp: "ghcr.io/QuickHaulTransits/quickhaul-otp:latest"
    frontend: "ghcr.io/QuickHaulTransits/quickhaul-frontend:latest"
    mongodb: "mongo:latest"
    redis: "redis:latest"

  # Lower resource limits for development
  resources:
    limits:
      cpu: 50m
      memory: 64Mi
    requests:
      cpu: 10m
      memory: 32Mi

  # HPA disabled for development
  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 2

  # Dev domain
  domain: "dev.quickhaul.io"
  tls:
    enabled: false
    issuer: "letsencrypt-staging"

  # Monitoring disabled for dev
  monitoring:
    enabled: false

# Service-specific overrides for development
auth-service:
  service:
    port: 8002
    nodePort: 30082
  ingress:
    enabled: false

booking-service:
  service:
    port: 8003
    nodePort: 30083
  ingress:
    enabled: false

location-service:
  service:
    port: 8001
    nodePort: 30084
  ingress:
    enabled: false

notification-service:
  service:
    port: 8004
    nodePort: 30085
  ingress:
    enabled: false

otp-service:
  service:
    port: 8005
    nodePort: 30086
  ingress:
    enabled: false

frontend:
  service:
    port: 80
    nodePort: 30080
  ingress:
    enabled: false
