# Production Environment Values
# Mapped to 'main' branch
# Namespace: quickhaul-prod

global:
  namespace: quickhaul-prod
  environment: prod
  replicaCount: 3
  nodePort: 30080
  strategy:
    type: "Rollout"
  
  # Production image tags - stable versions
  images:
    auth: "ghcr.io/quickhaultransits/quickhaul-auth:latest"
    booking: "ghcr.io/quickhaultransits/quickhaul-booking:latest"
    location: "ghcr.io/quickhaultransits/quickhaul-location:latest"
    notification: "ghcr.io/quickhaultransits/quickhaul-notification:latest"
    otp: "ghcr.io/quickhaultransits/quickhaul-otp:latest"
    frontend: "ghcr.io/quickhaultransits/quickhaul-frontend:latest"
    mongodb: "mongo:latest"
    redis: "redis:latest"

  # Higher resource limits for production
  resources:
    limits:
      cpu: 1000m
      memory: 1Gi
    requests:
      cpu: 500m
      memory: 512Mi

  # HPA settings for production
  autoscaling:
    enabled: true
    minReplicas: 3
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80

  # Ingress/Domain settings
  domain: "quickhaul.io"
  tls:
    enabled: true
    issuer: "letsencrypt-prod"

  # Monitoring
  monitoring:
    enabled: true
    prometheus:
      scrape: true

# Service-specific overrides for production
auth-service:
  service:
    port: 8002
  ingress:
    enabled: true
    host: "auth.quickhaul.io"

booking-service:
  service:
    port: 8003
  ingress:
    enabled: true
    host: "booking.quickhaul.io"

location-service:
  service:
    port: 8001
  ingress:
    enabled: true
    host: "location.quickhaul.io"

notification-service:
  service:
    port: 8004
  ingress:
    enabled: true
    host: "notifications.quickhaul.io"

otp-service:
  service:
    port: 8005
  ingress:
    enabled: true
    host: "otp.quickhaul.io"

frontend:
  service:
    port: 80
  ingress:
    enabled: true
    host: "app.quickhaul.io"
