global:
  # namespace: quick-haul (Managed by ArgoCD/Release Namespace)
  replicaCount: 2
  nodePort: 30080
  nfsServer: "172.31.16.204"
  nfsPath: "/mnt/nfs/mongodb"
  
  keycloak:
    issuerUrl: "https://auth.quickhaul.com/auth/realms/QuickHaul"
    clientId: "quickhaul-services"
  
  images:
    auth: "ghcr.io/sathvik307393/quickhaul-auth:latest"
    booking: "ghcr.io/sathvik307393/quickhaul-booking:latest"
    location: "ghcr.io/sathvik307393/quickhaul-location:latest"
    notification: "ghcr.io/sathvik307393/quickhaul-notification:latest"
    otp: "ghcr.io/sathvik307393/quickhaul-otp:latest"
    frontend: "ghcr.io/sathvik307393/quickhaul-frontend:latest"
    mongodb: "mongo:latest"
    redis: "redis:latest"
  
  imagePullSecrets:
    - name: regcred

  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 200m
      memory: 256Mi
